<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ── Open Graph (WhatsApp, Telegram, iMessage link preview) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="QuizBox" />
    <meta
      property="og:title"
      content="QuizBox – Du wurdest zu einem Quiz herausgefordert!"
    />
    <meta
      property="og:description"
      content="Jemand hat dich zu einem Quiz eingeladen. Tippe auf den Link, öffne QuizBox und zeig was du weißt!"
    />
    <meta
      property="og:image"
      content="https://www.quizboxapp.com/assets/icon.png"
    />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />
    <meta property="og:url" content="https://www.quizboxapp.com/invite/" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="QuizBox – Du wurdest zu einem Quiz herausgefordert!"
    />
    <meta
      name="twitter:description"
      content="Jemand hat dich zu einem Quiz eingeladen. Öffne QuizBox und zeig was du weißt!"
    />
    <meta
      name="twitter:image"
      content="https://www.quizboxapp.com/assets/icon.png"
    />

    <!-- ── Apple Smart App Banner (zeigt App-Icon + "Im App Store laden" in Safari) ── -->
    <meta
      name="apple-itunes-app"
      content="app-id=6740261890, app-argument=inviteToken"
    />

    <title>QuizBox – Quiz-Einladung</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #000000;
        color: #fff;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .logo {
        width: 300px;
        height: 300px;
        border-radius: 22px;
        margin-bottom: 24px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      h1 {
        font-size: 1.6rem;
        font-weight: 700;
        margin-bottom: 12px;
        line-height: 1.3;
      }
      p {
        font-size: 1rem;
        color: #b0aec8;
        line-height: 1.6;
        max-width: 320px;
        margin-bottom: 32px;
      }
      .btn {
        display: inline-block;
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
        color: #fff;
        text-decoration: none;
        padding: 14px 36px;
        border-radius: 50px;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.3px;
        box-shadow: 0 4px 20px rgba(124, 58, 237, 0.5);
        transition:
          transform 0.15s,
          box-shadow 0.15s;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .store-links {
        display: flex;
        gap: 16px;
        margin-top: 20px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .store-badge {
        height: 44px;
        border-radius: 8px;
      }
      .hint {
        margin-top: 32px;
        font-size: 0.78rem;
        color: #6b6a80;
      }
    </style>
  </head>
  <body>
    <img
      src="https://www.quizboxapp.com/assets/icon.png"
      alt="QuizBox"
      class="logo"
      id="appIcon"
    />
    <h1>Du wurdest zu einem<br />Quiz eingeladen!</h1>
    <p>
      Jemand hat dich herausgefordert – öffne QuizBox und beweise dein Wissen!
    </p>

    <a href="#" class="btn" id="openBtn">Herausforderung annehmen</a>

    <div class="store-links" id="storeLinks" style="display: none">
      <a
        href="https://apps.apple.com/de/app/quizbox/id6740261890"
        target="_blank"
      >
        <img
          src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg"
          alt="App Store"
          class="store-badge"
        />
      </a>
      <a
        href="https://play.google.com/store/apps/details?id=com.quizbox.app"
        target="_blank"
      >
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg"
          alt="Google Play"
          class="store-badge"
        />
      </a>
    </div>

    <p class="hint" id="hint">
      Tippe auf den Button – die App öffnet sich automatisch.
    </p>

    <script>
      (function () {
        // Token aus der URL extrahieren: /invite/{token}
        var token = window.location.pathname
          .replace(/^\/invite\/?/, "")
          .replace(/\/$/, "");
        // Universal Link (https) → funktioniert auf iOS + Android wenn App installiert
        // Custom Scheme als Fallback für den Button
        var universalLink = window.location.href;
        var deepLink = token
          ? "myquizbox://invite/" + encodeURIComponent(token)
          : "myquizbox://";

        // OG-URL dynamisch setzen (für exakten Kanonisierungs-Tag)
        var canonTag = document.querySelector('meta[property="og:url"]');
        if (canonTag) canonTag.setAttribute("content", window.location.href);

        // Smart App Banner: app-argument mit echtem deepLink befüllen
        var bannerMeta = document.querySelector(
          'meta[name="apple-itunes-app"]',
        );
        if (bannerMeta && token) {
          bannerMeta.setAttribute(
            "content",
            "app-id=6740261890, app-argument=" + deepLink,
          );
        }

        var btn = document.getElementById("openBtn");
        var hint = document.getElementById("hint");
        var storeLinks = document.getElementById("storeLinks");

        var ua = navigator.userAgent || "";
        var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
        var isAndroid = /Android/.test(ua);

        var APP_STORE_URL =
          "https://apps.apple.com/de/app/quizbox/id6740261890";
        var PLAY_STORE_URL =
          "https://play.google.com/store/apps/details?id=com.quizbox.app";

        if (isIOS) {
          // Versuche erst Universal Link (App öffnet sich direkt wenn installiert),
          // nach 1,5 s → App Store (App nicht installiert)
          window.location.href = deepLink;
          setTimeout(function () {
            window.location.href = APP_STORE_URL;
          }, 1500);
          return;
        }

        if (isAndroid) {
          // Intent-URL: öffnet App direkt falls installiert, sonst Play Store
          var intentUrl =
            "intent://invite/" +
            encodeURIComponent(token) +
            "#Intent;scheme=myquizbox;package=com.quizbox.app;" +
            "S.browser_fallback_url=" +
            encodeURIComponent(PLAY_STORE_URL) +
            ";end";
          window.location.href = intentUrl;
          return;
        }

        // Desktop: Landing-Page anzeigen (normales Verhalten)
        btn.href = deepLink;
        btn.addEventListener("click", function (e) {
          e.preventDefault();
          window.location.href = deepLink;
          setTimeout(function () {
            hint.textContent =
              "App nicht installiert? Lade QuizBox kostenlos herunter:";
            storeLinks.style.display = "flex";
          }, 2500);
        });
      })();
    </script>
  </body>
</html>
